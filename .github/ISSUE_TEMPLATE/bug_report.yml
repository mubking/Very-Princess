name: "🐛 Bug Report"
description: "Report a reproducible bug in the very-princess codebase."
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible.
        Before opening a new issue, please search the existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: "📝 Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "🔁 Steps to Reproduce"
      description: "Step-by-step instructions to reproduce the behavior."
      placeholder: |
        1. Navigate to '...'
        2. Call function '...'
        3. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ Expected Behavior"
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ Actual Behavior"
      description: "What actually happened? Include error messages, stack traces, or screenshots."
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: "📦 Affected Package"
      description: "Which part of the monorepo is affected?"
      options:
        - "packages/contracts (Soroban / Rust)"
        - "packages/backend (Node.js / Fastify)"
        - "packages/frontend (Next.js)"
        - "Root / Tooling"
        - "Multiple / Unknown"
    validations:
      required: true

  - type: input
    id: network
    attributes:
      label: "🌐 Network"
      description: "Which Stellar network were you on?"
      placeholder: "Testnet / Mainnet"

  - type: textarea
    id: environment
    attributes:
      label: "🖥️ Environment"
      description: "Please provide details about your environment."
      placeholder: |
        - OS: [e.g., macOS 14.1, Ubuntu 22.04, Windows 11]
        - Node.js version: [e.g., 20.11.0]
        - Rust/Cargo version: [e.g., 1.78.0]
        - Soroban CLI version: [e.g., 21.0.0]
        - Browser & Freighter version (if frontend): [e.g., Chrome 124 / Freighter 5.10.0]

  - type: checkboxes
    id: checklist
    attributes:
      label: "✔️ Pre-submission Checklist"
      options:
        - label: "I have searched existing issues and this is not a duplicate."
          required: true
        - label: "I have included all information needed to reproduce the bug."
          required: true
