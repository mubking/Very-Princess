name: "✨ Feature Request"
description: "Propose a new feature or improvement to the very-princess project."
title: "[Feature]: "
labels: ["enhancement", "needs-discussion"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! This project is designed for open-source contributions.
        Please provide as much context as possible so maintainers and community members can evaluate the proposal.

  - type: dropdown
    id: package
    attributes:
      label: "📦 Target Package"
      description: "Which package would this feature be added to?"
      options:
        - "packages/contracts (Soroban / Rust) — new contract logic"
        - "packages/backend (Node.js / Fastify) — new API endpoint or service"
        - "packages/frontend (Next.js) — new UI page or component"
        - "Root / Tooling — build, CI, documentation"
        - "Cross-cutting / Multiple packages"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "💡 Motivation"
      description: |
        Why is this feature needed? What problem does it solve?
        Link to any relevant Drips protocol docs, Stellar improvement proposals (SEPs), or community discussions.
      placeholder: "As a maintainer, I need to... because..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "🛠️ Proposed Solution"
      description: |
        Describe the feature in detail. For contract changes, include proposed function signatures.
        For API changes, include endpoint paths and request/response shapes.
      placeholder: |
        New contract function:
        ```rust
        pub fn remove_maintainer(env: Env, org_id: Symbol, maintainer: Address) { ... }
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "🔄 Alternatives Considered"
      description: "What other approaches did you consider? Why is your proposal better?"

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ Acceptance Criteria"
      description: |
        Define what 'done' looks like. This will become the basis for the PR checklist.
      placeholder: |
        - [ ] New contract function is implemented and unit-tested
        - [ ] Backend exposes a new endpoint `DELETE /orgs/:orgId/maintainers/:address`
        - [ ] Frontend shows a 'Remove Maintainer' button in the dashboard

  - type: checkboxes
    id: checklist
    attributes:
      label: "✔️ Pre-submission Checklist"
      options:
        - label: "I have searched existing issues and this is not a duplicate."
          required: true
        - label: "I am willing to implement this feature or help review a PR."
          required: false
